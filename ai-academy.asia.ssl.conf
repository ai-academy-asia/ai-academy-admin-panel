server {
	listen      161.97.136.164:443 ssl;
	server_name ai-academy.asia www.ai-academy.asia;
	# CKEditor uploads from /manage/ POST to /api/file/upload/ckeditor — default nginx limit is 1m.
	client_max_body_size 50m;
	error_log   /var/log/apache2/domains/ai-academy.asia.error.log error;

	ssl_certificate     /home/Oyungoo/conf/web/ai-academy.asia/ssl/ai-academy.asia.pem;
	ssl_certificate_key /home/Oyungoo/conf/web/ai-academy.asia/ssl/ai-academy.asia.key;
	ssl_stapling        on;
	ssl_stapling_verify on;

	# TLS 1.3 0-RTT anti-replay
	if ($anti_replay = 307) { return 307 https://$host$request_uri; }
	if ($anti_replay = 425) { return 425; }

	include /home/Oyungoo/conf/web/ai-academy.asia/nginx.hsts.conf*;

	location ~ /\.(?!well-known\/|file) {
		deny all;
		return 404;
	}

	location / {
		proxy_pass http://localhost:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
	}
location /auth/ {
                proxy_pass http://localhost:8003/auth/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }	

location /manage/ {
                proxy_pass http://localhost:3060/manage/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }	
location /api/ {
		client_max_body_size 50m;
		proxy_pass http://127.0.0.1:8000/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
	
	location @fallback {
		proxy_ssl_server_name on;
		proxy_ssl_name $host;
		proxy_pass https://161.97.136.164:8443;
	}

	location /error/ {
		alias /home/Oyungoo/web/ai-academy.asia/document_errors/;
	}

	proxy_hide_header Upgrade;

	include /home/Oyungoo/conf/web/ai-academy.asia/nginx.ssl.conf_*;
}
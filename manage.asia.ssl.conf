#=========================================================================#
# Default Web Domain Template                                             #
# DO NOT MODIFY THIS FILE! CHANGES WILL BE LOST WHEN REBUILDING DOMAINS   #
# https://hestiacp.com/docs/server-administration/web-templates.html      #
#=========================================================================#

server {
	listen      161.97.136.164:443 ssl;
	server_name manage.ai-academy.asia ;
	error_log   /var/log/apache2/domains/manage.ai-academy.asia.error.log error;

	ssl_certificate     /home/Oyungoo/conf/web/manage.ai-academy.asia/ssl/manage.ai-academy.asia.pem;
	ssl_certificate_key /home/Oyungoo/conf/web/manage.ai-academy.asia/ssl/manage.ai-academy.asia.key;
	ssl_stapling        on;
	ssl_stapling_verify on;

	# TLS 1.3 0-RTT anti-replay
	if ($anti_replay = 307) { return 307 https://$host$request_uri; }
	if ($anti_replay = 425) { return 425; }

	include /home/Oyungoo/conf/web/manage.ai-academy.asia/nginx.hsts.conf*;

	location ~ /\.(?!well-known\/|file) {
		deny all;
		return 404;
	}

	location = / {
            return 301 /manage/;
  }

	location /manage/ {
		        proxy_pass http://localhost:3060/manage/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
	}
	location /auth/ {
            proxy_pass http://localhost:8003/auth/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
	location /api/ {
		client_max_body_size 50m;
		proxy_pass http://localhost:8000/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
	location @fallback {
            proxy_ssl_server_name on;
            proxy_ssl_name $host;
            proxy_pass https://161.97.136.164:8443;
	}

	location /error/ {
		alias /home/Oyungoo/web/manage.ai-academy.asia/document_errors/;
	}

	proxy_hide_header Upgrade;

	include /home/Oyungoo/conf/web/manage.ai-academy.asia/nginx.ssl.conf_*;
}